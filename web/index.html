<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Evora Health - Track. Train. Transform.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0A">

  <!-- Open Graph -->
  <meta property="og:title" content="Evora Health">
  <meta property="og:description" content="Track. Train. Transform.">
  <meta property="og:url" content="https://app.evorahealth.co.za">

  <title>Evora Health</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #060606;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0A0A0A;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    }
    .loading-logo {
      width: 56px;
      height: 56px;
      background: #00E5C8;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .loading-text {
      letter-spacing: 6px;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .loading-sub {
      font-size: 13px;
      color: #666;
    }
    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #222;
      border-top-color: #00E5C8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M14 4C14 4 5 9 5 16C5 20.4 9.1 24 14 24C18.9 24 23 20.4 23 16C23 9 14 4 14 4Z" fill="black"/>
      </svg>
    </div>
    <div class="loading-text">EVORA</div>
    <div class="loading-sub">Track. Train. Transform.</div>
    <div class="loading-spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
